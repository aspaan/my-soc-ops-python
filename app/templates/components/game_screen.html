<div id="game-container">
<div class="flex flex-col min-h-full bg-magic">
    <!-- Magical Header -->
    <header class="flex items-center justify-between p-3 bg-white border-b-2 border-unicorn-pink shadow-sm">
        <button
            hx-post="/reset"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="text-unicorn-purple text-sm px-3 py-1.5 rounded-lg hover:bg-unicorn-pink-light active:bg-unicorn-purple-light transition-colors">
            ← Back
        </button>
        <h1 class="font-bold text-unicorn-purple">🦄 Soc Ops</h1>
        <div class="w-16"></div>
    </header>

    <!-- Instructions -->
    <p class="text-center text-unicorn-pink text-sm py-2 px-4 font-medium">
        ✨ Tap a square when you find someone who matches it ✨
    </p>

    <!-- Bingo indicator -->
    {% if session.has_bingo %}
    <div class="bg-unicorn-rainbow text-white text-center py-2 font-bold text-sm shadow-sparkle">
        🎉✨ BINGO! You got a line! ✨🎉
    </div>
    {% endif %}

    <!-- Board -->
    <div class="flex-1 flex items-center justify-center p-3">
        {% include "components/bingo_board.html" %}
    </div>
</div>

{% if session.show_bingo_modal %}
    {% include "components/bingo_modal.html" %}
{% endif %}
</div>
