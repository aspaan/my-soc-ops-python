<div id="game-container">
<div class="flex flex-col items-center justify-center min-h-full p-6 bg-magic">
    <div class="text-center max-w-sm">
        <!-- Unicorn header with sparkles -->
        <div class="relative mb-4">
            <span class="text-5xl animate-float">🦄</span>
            <span class="absolute -top-2 -right-4 text-2xl animate-sparkle">✨</span>
            <span class="absolute top-0 -left-4 text-xl animate-sparkle" style="animation-delay: 0.5s;">⭐</span>
        </div>
        
        <h1 class="text-4xl font-bold text-unicorn-purple mb-2 animate-shimmer">Soc Ops</h1>
        <p class="text-lg text-unicorn-pink font-semibold mb-8">✨ Social Bingo ✨</p>

        <!-- Magical how to play card -->
        <div class="bg-white rounded-xl p-6 shadow-magic border-2 border-unicorn-purple mb-8 relative overflow-hidden">
            <div class="absolute top-0 right-0 w-16 h-16 opacity-20">
                <span class="text-6xl">🌈</span>
            </div>
            <h2 class="font-semibold text-unicorn-purple mb-3 relative z-10">How to play</h2>
            <ul class="text-left text-gray-600 text-sm space-y-2 relative z-10">
                <li>🦋 Find people who match the questions</li>
                <li>👆 Tap a square when you find a match</li>
                <li>🌟 Get 5 in a row to win!</li>
            </ul>
        </div>

        <!-- Magical start button -->
        <button
            hx-post="/start"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="w-full bg-unicorn-rainbow text-white font-bold py-4 px-8 rounded-xl text-lg shadow-sparkle transition-all duration-300 hover:scale-105 active:scale-95 relative overflow-hidden">
            <span class="relative z-10">🌈 Start Game 🌈</span>
            <span class="absolute inset-0 bg-white opacity-0 hover:opacity-20 transition-opacity"></span>
        </button>
        
        <!-- Decorative sparkles -->
        <div class="mt-6 flex justify-center gap-4">
            <span class="text-xl animate-sparkle">✨</span>
            <span class="text-xl animate-sparkle" style="animation-delay: 0.3s;">🌟</span>
            <span class="text-xl animate-sparkle" style="animation-delay: 0.6s;">💫</span>
        </div>
    </div>
</div>
</div>
