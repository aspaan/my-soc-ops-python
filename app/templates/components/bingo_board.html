<div class="grid grid-cols-5 gap-1 w-full max-w-md mx-auto aspect-square">
    {% for square in session.board %}
    {% set is_winning = square.id in session.winning_square_ids %}
    {% set cell_index = loop.index0 % 25 %}
    <button
        {% if not square.is_free_space %}
        hx-post="/toggle/{{ square.id }}"
        hx-target="#game-container"
        hx-swap="outerHTML"
        {% endif %}
        {% if square.is_free_space %}disabled{% endif %}
        class="relative flex items-center justify-center p-1 text-center border rounded-lg transition-all duration-150 select-none min-h-[60px] text-xs leading-tight
        {%- if square.is_free_space %}
            bg-free-space text-unicorn-purple font-bold text-sm border-unicorn-purple
        {%- elif square.is_marked %}
            {%- if is_winning %} bg-winning border-pink-400 text-white animate-pulse-glow
            {%- else %} bg-marked-unicorn border-unicorn-mint text-unicorn-mint
            {%- endif %}
        {%- else %} bg-cell-{{ cell_index }} border-unicorn-pink/30 text-gray-700 active:bg-unicorn-purple-light
        {%- endif %}"
        aria-pressed="{{ 'true' if square.is_marked else 'false' }}"
        aria-label="{{ 'Free space' if square.is_free_space else square.text }}">
        <span class="wrap-break-word hyphens-auto">{{ square.text }}</span>
        {% if square.is_marked and not square.is_free_space %}
        <span class="absolute top-0.5 right-0.5 text-unicorn-mint text-xs animate-sparkle">✨</span>
        {% endif %}
        {% if square.is_free_space %}
        <span class="absolute -bottom-1 text-xs">🦄</span>
        {% endif %}
    </button>
    {% endfor %}
</div>
